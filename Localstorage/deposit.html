<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="deposit-wrapper">
        <div class="deposit-card">
            <a href="menu.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
            <div class="page-title"><i class="fas fa-arrow-down"></i> Depositar</div>
            <div class="page-sub">Agrega fondos a tu cuenta</div>

            <div class="current-balance">
                <div class="label">Saldo actual</div>
                <div class="amount" id="currentBalance">$0 CLP</div>
            </div>

            <form id="depositForm">
                <div class="form-group">
                    <label for="depositAmount"><i class="fas fa-money-bill-wave" style="margin-right: 6px;"></i>Monto a depositar</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text">$</span>
                        </div>
                        <input type="number" class="form-control" id="depositAmount" placeholder="0" min="1" step="1" required>
                    </div>
                </div>

                <div class="quick-amounts">
                    <div class="quick-amount" data-amount="1000">$1k</div>
                    <div class="quick-amount" data-amount="5000">$5k</div>
                    <div class="quick-amount" data-amount="10000">$10k</div>
                    <div class="quick-amount" data-amount="50000">$50k</div>
                </div>

                <div class="alert-container" id="alertContainer"></div>

                <div class="deposit-confirmation" id="depositConfirmation">
                    <i class="fas fa-check-circle" style="margin-right: 8px;"></i>
                    ¡Depósito exitoso! <strong id="depositAmountDisplay">$0</strong>
                </div>

                <button type="submit" class="btn-deposit" id="depositBtn">
                    <i class="fas fa-check-circle" style="margin-right: 8px;"></i>Realizar depósito
                </button>
            </form>

            <a href="menu.html" class="btn-menu">
                <i class="fas fa-home" style="margin-right: 8px;"></i>Menú Principal
            </a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/contacts.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return;
            }

            const user = window.Alke.data.usuarioActual();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            let balance = user.saldo || 0;
            $('#currentBalance').text(`$${balance.toLocaleString()} CLP`);

            function showAlert(message, type) {
                const container = $('#alertContainer');
                const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                container.html(`
                    <div class="alert ${alertClass} show" role="alert">
                        <i class="fas ${icon}"></i> ${message}
                    </div>
                `);
                setTimeout(() => {
                    $('.alert').fadeOut(300, function() { $(this).remove(); });
                }, 5000);
            }

            $('.quick-amount').click(function() {
                $('#depositAmount').val($(this).data('amount'));
            });

            $('#depositForm').submit(function(e) {
                e.preventDefault();
                const amount = parseFloat($('#depositAmount').val());
                const btn = $('#depositBtn');

                if (!amount || amount <= 0) {
                    showAlert('Ingresa un monto válido.', 'error');
                    return;
                }

                btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Procesando...');

                setTimeout(() => {
                    const result = window.Alke.wallet.depositar(amount);
                    if (result.ok) {
                        $('#currentBalance').text(`$${result.saldo.toLocaleString()} CLP`);
                        $('#depositAmountDisplay').text(`$${amount.toLocaleString()} CLP`);
                        $('#depositConfirmation').addClass('show');
                        showAlert(`¡Depósito exitoso! $${amount.toLocaleString()} CLP acreditados.`, 'success');
                        $('#depositAmount').val('');
                        btn.prop('disabled', false).html('<i class="fas fa-check-circle" style="margin-right: 8px;"></i>Realizar depósito');

                        setTimeout(() => {
                            window.location.href = 'menu.html';
                        }, 2000);
                    } else {
                        showAlert(result.error, 'error');
                        btn.prop('disabled', false).html('<i class="fas fa-check-circle" style="margin-right: 8px;"></i>Realizar depósito');
                    }
                }, 800);
            });
        });
    </script>
</body>
</html>
