<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="menu-wrapper">
        <div class="menu-card">
            <div class="menu-header">
                <div class="menu-brand">
                    <div class="brand-icon"><i class="fas fa-wallet"></i></div>
                    <div class="brand-text">Alke <span>Wallet</span></div>
                </div>
                <div class="user-info">
                    <div>
                        <div class="user-name">
                            <strong id="userGreeting">Usuario</strong>
                        </div>
                    </div>
                    <div class="user-avatar" id="userAvatar">U</div>
                </div>
            </div>

            <div class="balance-box">
                <div class="label">Saldo disponible</div>
                <div class="amount" id="balanceDisplay">
                    $0 <span class="currency">CLP</span>
                </div>
                <div class="sub"><i class="fas fa-credit-card"></i> Cuenta principal</div>
            </div>

            <div class="menu-grid">
                <a href="deposit.html" class="menu-item">
                    <i class="fas fa-arrow-down"></i>
                    <span>Depositar</span>
                </a>
                <a href="sendmoney.html" class="menu-item">
                    <i class="fas fa-paper-plane"></i>
                    <span>Enviar</span>
                </a>
                <a href="transactions.html" class="menu-item">
                    <i class="fas fa-history"></i>
                    <span>Movimientos</span>
                </a>
            </div>

            <button class="btn-logout" id="logoutBtn">
                <i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i>Cerrar sesión
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/contacts.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function() {
            // Verificar sesión
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return;
            }

            // Obtener datos del usuario
            const user = window.Alke.data.usuarioActual();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Mostrar datos del usuario
            const email = user.email || 'Usuario';
            $('#userGreeting').text(email);
            $('#userAvatar').text(email.charAt(0).toUpperCase());

            // Mostrar saldo
            const saldo = user.saldo || 0;
            $('#balanceDisplay').html(`$${saldo.toLocaleString()} <span class="currency">CLP</span>`);

            // Cerrar sesión
            $('#logoutBtn').click(function() {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userEmail');
                window.Alke.auth.logout();
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
