<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo-icon"><i class="fas fa-wallet"></i></div>
                <div class="logo-text">Alke <span>Wallet</span></div>
                <div class="logo-sub">Finanzas digitales</div>
            </div>

            <div class="test-credentials">
                <p>
                    <i class="fas fa-key" style="color: rgba(255,255,255,0.3); margin-right: 6px;"></i>
                    Prueba con <strong>demo@alke.cl</strong>
                    <span class="badge">123456</span>
                </p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope" style="margin-right: 6px;"></i>Correo electrónico</label>
                    <input type="email" class="form-control" id="email" placeholder="demo@alke.cl" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock" style="margin-right: 6px;"></i>Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••" required>
                </div>

                <div class="alert-container" id="alertContainer"></div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Iniciar sesión
                </button>
            </form>

            <div class="footer-link">
                ¿No tienes cuenta? <a href="#">Regístrate</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/contacts.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function() {
            // Verificar si ya hay sesión
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'menu.html';
            }

            function showAlert(message, type) {
                const container = $('#alertContainer');
                const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                container.html(`
                    <div class="alert ${alertClass} show" role="alert">
                        <i class="fas ${icon}"></i> ${message}
                    </div>
                `);
                setTimeout(() => {
                    $('.alert').fadeOut(300, function() { $(this).remove(); });
                }, 5000);
            }

            $('#loginForm').submit(function(e) {
                e.preventDefault();

                const email = $('#email').val().trim();
                const password = $('#password').val().trim();
                const btn = $('#loginBtn');

                if (!email || !password) {
                    showAlert('Por favor, completa todos los campos.', 'error');
                    return;
                }

                btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Verificando...');

                // Usar el objeto Alke.auth.login
                const result = window.Alke.auth.login(email, password);

                setTimeout(() => {
                    if (result.ok) {
                        showAlert('¡Bienvenido a Alke Wallet! Redirigiendo...', 'success');
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userEmail', email);

                        setTimeout(() => {
                            window.location.href = 'menu.html';
                        }, 1500);
                    } else {
                        showAlert(result.error || 'Credenciales incorrectas.', 'error');
                        btn.prop('disabled', false).html('<i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Iniciar sesión');
                        $('#password').val('').focus();
                    }
                }, 800);
            });
        });
    </script>
</body>
</html>
